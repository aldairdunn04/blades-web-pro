<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Blades Studio - Funcional</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #000;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -1px;
        }
        #qrcode {
            margin: 20px 0;
        }
        .url {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }
        .btn {
            margin-top: 30px;
            background: #D4AF37;
            color: #000;
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>BLADES STUDIO</h1>
        <div id="qrcode"></div>
        <div class="url">blades-web-pro.vercel.app</div>
    </div>
    <a href="#" class="btn" onclick="window.print()">IMPRIMIR QR</a>

    <script>
        const url = "https://blades-web-pro.vercel.app/";
        QRCode.toCanvas(document.getElementById('qrcode'), url, {
            width: 300,
            margin: 2,
            color: {
                dark: '#000000',
                light: '#ffffff'
            }
        }, function (error) {
            if (error) console.error(error);
            console.log('QR generado correctamente');
        });
    </script>
</body>
</html>
